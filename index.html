                ]
            },
            {
                tag: "情境 14（當團隊成員犯錯時）",
                question: "你帶領的後輩因為粗心把未測試的程式碼/文件發給了重要大客戶，造成客戶微詞，你會？",
                options: [
                    { text: "主動站到最前面向客戶致歉、承擔責任，展現高超交涉手腕，幫後輩把子彈全部擋下來。", scores: { blue: 3, red: 1 } },
                    { text: "一邊善後，一邊命令後輩留下來，徹夜檢討並建立「出貨防呆檢核清單（SOP）」，保證不會有下一次。", scores: { purple: 3, white: 2 } },
                    { text: "冷酷但精準地對後輩指出：「這是低級錯誤。你的盲點在於 X 跟 Y，請立刻去給我修正。」", scores: { red: 3, white: 2 } },
                    { text: "對後輩說：「別沮喪，這是一個很好的實驗教訓！我們來想想怎麼把這個錯誤轉化為產品新特色？」", scores: { yellow: 3, blue: 1 } }
                ]
            },
            {
                tag: "情境 15（關於下班這件事）",
                question: "下班時間到了，事情做得差不多，但全辦公室包括大老闆都還死沉沉地坐在原位加班，你會？",
                options: [
                    { text: "時間到優雅收拾包包，微笑跟大家說再見，準時神話延續，內心毫無波瀾。", scores: { purple: 3, white: 1 } },
                    { text: "大聲地問周圍的人：「大家還好嗎？需不需要幫忙買宵夜或點飲料？」順便用歡樂語調打破沉悶氣氛。", scores: { blue: 3, yellow: 1 } },
                    { text: "故意走去老闆桌前高調回報：「老闆，我今天負責的專案進度超前 20%，那我先回去囉！」", scores: { red: 3, yellow: 1 } },
                    { text: "繼續留著，但其實是在偷偷研究自己的 AI 詠唱、寫自己的個人專案，外表看起來像在為公司拼命。", scores: { white: 3, yellow: 2 } }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let userScores = { red: 0, blue: 0, yellow: 0, purple: 0, white: 0 };
        let radarChartInstance = null;

        function startGame() {
            document.getElementById('start-card').classList.add('hidden');
            document.getElementById('quiz-card').classList.remove('hidden');
            currentQuestionIndex = 0;
            userScores = { red: 0, blue: 0, yellow: 0, purple: 0, white: 0 };
            showQuestion();
        }

        function showQuestion() {
            const currentQuiz = quizData[currentQuestionIndex];

            const progressPercent = Math.round(((currentQuestionIndex) / quizData.length) * 100);
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('progress-percent').innerText = `${progressPercent}%`;
            document.getElementById('question-counter').innerText = `題數 ${currentQuestionIndex + 1} / ${quizData.length}`;

            document.getElementById('question-tag').innerText = currentQuiz.tag;
            document.getElementById('question-text').innerText = currentQuiz.question;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            currentQuiz.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-50 hover:bg-slate-100 active:bg-emerald-50 p-4 rounded-xl border border-slate-200 transition duration-150 cursor-pointer text-sm leading-relaxed shadow-xs block";
                btn.innerText = option.text;
                btn.onclick = () => selectOption(option.scores);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(scores) {
            for (let color in scores) {
                userScores[color] += scores[color];
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('result-card').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-percent').innerText = '100%';

            let maxColor = 'white';
            let maxScore = -1;
            for (let color in userScores) {
                if (userScores[color] > maxScore) {
                    maxScore = userScores[color];
                    maxColor = color;
                }
            }

            const pikminDatabase = {
                white: {
                    title: "自帶防毒面具的白色皮克敏",
                    avatar: "<img src=\"content/IMG_4989.PNG\" alt=\"白色皮克敏\" style=\"width: 100px; height: 100px; object-fit: contain;\">",
                    imageSrc: "content/IMG_4989.PNG",
                    tags: ["#Excel盲點秒殺器", "#外表看似無害細心過於常人", "#準時下班的風控之眼"],
                    advantage: "在 AI 時代，你是不可或缺的白色屬性。當別人盲目相信 AI 生成的數據或落入精美簡報的陷阱時，只有你那敏銳的雙眼能一眼看穿合約或流程裡隱藏的『毒點（Bug）』。你不是行政機器，你是高階的職場除錯大師與隱形風控核心。",
                    mine: "注意：有時過度追求完美與自我防禦，會讓你卡在細節裡不敢大膽推進（紫/白特質）。當面對快速變動的藍海市場時，試著像黃色皮克敏一樣『飛高一點』看大局！",
                    partner: "黃色皮克敏（行銷創意擔當）",
                    enemy: "藍色皮克敏（潛水溝通大師）"
                },
                purple: {
                    title: "重量級大牛紫色皮克敏",
                    avatar: "<img src=\"content/IMG_4988.PNG\" alt=\"紫色皮克敏\" style=\"width: 100px; height: 100px; object-fit: contain;\">",
                    imageSrc: "content/IMG_4988.PNG",
                    tags: ["#一人抵十人", "#嚴謹準時神話", "#核心流程壓艙石"],
                    advantage: "你是團隊中最強大的後援與穩定力量。你對規則、歷史數據與設備清單瞭若指掌。當面對排山倒海的繁瑣文件與突發任務時，你那教科書般的嚴謹 SOP 邏輯能讓混亂的現場瞬間重回正軌，是真正的一人抵十人重量級大牛。",
                    mine: "注意：當計畫被外部臨時更改、或者遭遇沒有前例可循的狀況時，容易產生排斥感。保持穩健的同時，容許一點點彈性會讓你更具侵略性！",
                    partner: "藍色皮克敏（高 EQ 協調者）",
                    enemy: "黃色皮克敏（天馬行空大師）"
                },
                red: {
                    title: "熱血衝鋒的紅色皮克敏",
                    avatar: "<img src=\"content/IMG_4976.PNG\" alt=\"紅色皮克敏\" style=\"width: 100px; height: 100px; object-fit: contain;\">",
                    imageSrc: "content/IMG_4976.PNG",
                    tags: ["#高調提案機", "#直面對決毒點", "#超強戰鬥執行力"],
                    advantage: "你擁有全團隊中最強大的衝鋒執行力與破局能力。對事不對人，當專案卡關 or 權益受損時，你敢於站在第一線直接開火、抓出毒點、釐清責任，是團隊突破僵局、拿下新客戶不可或缺的重裝攻擊武器。",
                    mine: "注意：直線條、高能量的溝通有時會燙傷周圍心思細膩的夥伴。衝鋒陷陣之餘，記得回頭確認後方行政與數據補給是否跟上，才不會流於孤軍奮戰。",
                    partner: "紫色皮克敏（穩健後援大師）",
                    enemy: "藍色皮克敏（溫和協調派）"
                },
                yellow: {
                    title: "天馬行空的黃色皮克敏",
                    avatar: "<img src=\"content/IMG_4981.PNG\" alt=\"黃色皮克敏\" style=\"width: 100px; height: 100px; object-fit: contain;\">",
                    imageSrc: "content/IMG_4981.PNG",
                    tags: ["#跳脫框架狂人", "#AI詠唱大師", "#隨機應變享受者"],
                    advantage: "你天生自帶高敏捷與高能量，不喜歡被舊有的死板規則束縛。面對新科技或者是突發大包時，你最擅長跳脫框架，邊試邊調，用驚人的直覺、聯想力與創新的非傳統方法找出解決方案，是團隊的創意發想機。",
                    mine: "注意：過於發散的思維與隨興的節奏，容易讓落地的行政與 SOP 出現斷層。記得適時呼叫穩健、細心的夥伴幫你收尾與建立防呆機制。",
                    partner: "白色皮克敏（細心除錯大師）",
                    enemy: "紫色皮克敏（嚴謹規範守護者）"
                },
                blue: {
                    title: "水深區生存的藍色皮克敏",
                    avatar: "<img src=\"content/IMG_4987.PNG\" alt=\"藍色皮克敏\" style=\"width: 100px; height: 100px; object-fit: contain;\">",
                    imageSrc: "content/IMG_4987.PNG",
                    tags: ["#高EQ協調大師", "#以人為本調溫器", "#團隊氣氛守護者"],
                    advantage: "你是團隊裡的超強護航者與核心調和劑。在跨部門衝突或交接失誤的危機時刻，你總能以人為本，先透過高超的 EQ 調整水溫、承擔情緒，在歡樂不傷和氣的氛圍下解決最難搞的政治問題，在深水區生存力極強。",
                    mine: "注意：有時太在乎大家的「開不開心」與團隊氣氛，會讓你承受過多的行政與溝通壓力、甚至被道德綁架。記得勇敢畫出工作底線，適時呼叫強勢夥伴幫你開火。",
                    partner: "紅色皮克敏（敢言衝鋒隊長）",
                    enemy: "白色皮克敏（冰冷風險防禦官）"
                }
            };

            const result = pikminDatabase[maxColor];

            document.getElementById('result-image-container').innerHTML = `
                <img src="${result.imageSrc}" 
                     alt="${result.title}" 
                     class="w-[100px] h-[100px] object-contain drop-shadow-xl animate-bounce-short">
            `;
            
            document.getElementById('result-avatar').innerHTML = result.avatar;
            document.getElementById('result-title').innerText = result.title;

            const tagsContainer = document.getElementById('result-tags');
            tagsContainer.innerHTML = '';
            result.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = "bg-slate-50 text-emerald-700 text-xs px-2.5 py-1 rounded-md font-medium shadow-xs border border-slate-200";
                span.innerText = tag;
                tagsContainer.appendChild(span);
            });

            document.getElementById('advantage-text').innerText = result.advantage;
            document.getElementById('mine-text').innerText = result.mine;
            document.getElementById('best-partner').innerText = result.partner;
            document.getElementById('worst-enemy').innerText = result.enemy;

            const ctx = document.getElementById('radarChart').getContext('2d');

            if (radarChartInstance) {
                radarChartInstance.destroy();
            }

            radarChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['執行力 (紅)', '溝通力 (藍)', '創新力 (黃)', '抗壓性 (紫)', '細心度 (白)'],
                    datasets: [{
                        label: '你的搬運大師潛力指標',
                        data: [
                            userScores.red + 1,
                            userScores.blue + 1,
                            userScores.yellow + 1,
                            userScores.purple + 1,
                            userScores.white + 1
                        ],
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(16, 185, 129, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { display: true },
                            suggestMin: 0,
                            ticks: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function restartGame() {
            document.getElementById('result-card').classList.add('hidden');
            document.getElementById('start-card').classList.remove('hidden');
        }
    </script>
</body>
</html>
